services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./db:/var/www/html/db
      - ./.env:/var/www/html/.env:ro
    restart: unless-stopped

  worker:
    build: .
    command: >
      sh -c "while true; do php /var/www/html/worker/check.php; sleep 300; done"
    volumes:
      - ./db:/var/www/html/db
      - ./.env:/var/www/html/.env:ro
    restart: unless-stopped
    depends_on:
      - app
